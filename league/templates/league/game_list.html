{% extends "base.html" %}

{% block title %}Games{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h2>Games</h2>
    <a href="{% url 'league:game_create' %}" class="btn btn-primary">Add Game</a>
</div>

<div class="table-responsive">
    <table class="table table-striped">
        <thead class="table-dark">
            <tr>
                <th>Date</th>
                <th>Away</th>
                <th>Home</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody>
            {% for game in games %}
            <tr>
                <td>{{ game.date }}</td>
                <td>{{ game.away_team.name }}</td>
                <td>{{ game.home_team.name }}</td>
                <td>
                    <a href="{% url 'league:stat_entry_select' game.id %}" class="btn btn-sm btn-outline-primary">Enter Stats</a>
                </td>
            </tr>
            {% empty %}
            <tr><td colspan="4" class="text-center">No games yet.</td></tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
